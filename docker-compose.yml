version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drive-app
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: 'https://drive.sitebase.co.ke'
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: storage_app
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    volumes:
      - drive-storage:/app/storage/app/drive
      - drive-storage:/app/storage/framework/cache
      - drive-storage:/app/storage/framework/sessions
      - drive-storage:/app/storage/framework/views
      - drive-storage:/app/storage/logs
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  drive-storage:
